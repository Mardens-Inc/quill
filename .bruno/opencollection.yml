opencollection: 1.0.0

info:
  name: Quill - Autoprinter
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  variables:
    - name: base_url
      value: http://localhost:51820
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
